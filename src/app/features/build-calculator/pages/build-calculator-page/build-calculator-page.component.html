<main class="min-h-screen bg-background p-6" aria-label="LoL Build Calculator">
  <div class="max-w-4xl mx-auto space-y-6">

    <!-- Header -->
    <header>
      <h1 class="text-3xl font-bold tracking-tight">LoL Build Calculator</h1>
      <p class="text-muted-foreground mt-1">Select a champion, set your level and items to see the final stats.</p>
    </header>

    <!-- Champion selection -->
    <section aria-label="Champion selection" class="space-y-3">
      <h2 class="text-lg font-semibold">Champion</h2>
      <app-champion-search />
      @if (build.selectedChampion()) {
        <app-champion-card />
      }
    </section>

    <!-- Level selector -->
    @if (build.selectedChampion()) {
      <section aria-label="Level selection">
        <app-level-selector />
      </section>
    }

    <!-- Items -->
    @if (build.selectedChampion()) {
      <section aria-label="Items" class="space-y-3">
        <h2 class="text-lg font-semibold">Items</h2>
        <app-item-grid />
        @if (build.activeSlotIndex() !== null) {
          <app-item-search />
        }
      </section>
    }

    <!-- Stats panel -->
    @if (build.finalStats()) {
      <app-stats-panel />
    }

  </div>
</main>
