@if (ddragon.champions().length > 0) {
  <z-select
    zPlaceholder="Select a champion..."
    aria-label="Champion selection"
    (zSelectionChange)="onChampionSelect($event)"
  >
    @for (champion of ddragon.champions(); track champion.id) {
      <z-select-item [zValue]="champion.id">{{ champion.name }}</z-select-item>
    }
  </z-select>
} @else {
  <div class="h-9 w-full rounded-md border bg-muted/30 animate-pulse" aria-busy="true" aria-label="Loading champions..."></div>
}
