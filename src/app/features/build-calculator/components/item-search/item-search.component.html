<div class="border rounded-lg bg-card shadow-lg overflow-hidden" role="dialog" aria-label="Item picker" aria-modal="true">
  <div class="flex items-center justify-between px-3 pt-3">
    <p class="text-sm font-medium">
      Select item for slot {{ (build.activeSlotIndex() ?? 0) + 1 }}
    </p>
    <button
      z-button
      zType="ghost"
      zSize="sm"
      type="button"
      aria-label="Close item picker"
      (click)="build.closeItemPicker()"
    >
      <i z-icon zType="x"></i>
    </button>
  </div>
  <z-command (zCommandSelected)="onItemSelect($event.value)" aria-label="Item search">
    <z-command-input placeholder="Search items..." aria-label="Search items" />
    <z-command-list class="max-h-64" aria-label="Item list">
      <z-command-empty>No item found.</z-command-empty>
      @for (item of ddragon.items(); track item.id) {
        <z-command-option
          [zValue]="item.id"
          [zLabel]="item.name"
          [zCommand]="item.name"
        >
        </z-command-option>
      }
    </z-command-list>
  </z-command>
</div>
