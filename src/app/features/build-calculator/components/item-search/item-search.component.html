<div class="space-y-2">
  <p class="text-sm font-medium">
    Select item for slot {{ (build.activeSlotIndex() ?? 0) + 1 }}
  </p>
  @if (ddragon.items().length > 0) {
    <z-select
      zPlaceholder="Select an item..."
      aria-label="Item selection"
      (zSelectionChange)="onItemSelect($event)"
    >
      @for (item of ddragon.items(); track item.id) {
        <z-select-item [zValue]="item.id">{{ item.name }}</z-select-item>
      }
    </z-select>
  } @else {
    <div class="h-9 w-full rounded-md border bg-muted/30 animate-pulse" aria-busy="true" aria-label="Loading items..."></div>
  }
</div>
