@if (manager.savedBuilds().length === 0) {
  <div class="flex flex-col items-center justify-center py-16 text-muted-foreground gap-2">
    <p class="text-sm">Save at least one build to compare.</p>
  </div>
} @else {
  <ag-grid-angular
    class="w-full"
    style="height: 380px;"
    [theme]="gridTheme()"
    [rowData]="rowData()"
    [columnDefs]="columnDefs()"
    [defaultColDef]="defaultColDef"
    [suppressCellFocus]="false"
    aria-label="Builds comparison table"
  />

  @if (manager.savedBuilds().length >= 2) {
    <div class="mt-6 flex flex-col gap-3">
      <div class="flex items-center gap-3">
        <label id="stat-select-label" class="text-sm font-medium shrink-0">Stats affichées</label>
        <z-select
          [zMultiple]="true"
          [zValue]="selectedStatKeys()"
          zPlaceholder="Sélectionner des stats..."
          aria-labelledby="stat-select-label"
          (zSelectionChange)="selectedStatKeys.set($any($event))"
          class="min-w-64"
        >
          @for (opt of statOptions; track opt.value) {
            <z-select-item [zValue]="opt.value">{{ opt.label }}</z-select-item>
          }
        </z-select>
      </div>

      @if (chartConfig(); as cfg) {
        <div class="rounded-lg border p-4" style="height: 360px;" role="region" aria-label="Stat comparison chart">
          <apps-chart [config]="cfg" class="h-full" />
        </div>
      }
    </div>
  }
}
