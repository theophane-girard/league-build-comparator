<div
  cdkTrapFocus
  cdkTrapFocusAutoCapture
  class="fixed inset-0 z-40 flex flex-col bg-background"
  role="dialog"
  aria-modal="true"
  aria-labelledby="builder-modal-title"
  (keydown.escape)="manager.closeBuilderModal()"
>
  <!-- Header -->
  <header class="flex items-center justify-between gap-4 px-6 py-4 border-b border-border shrink-0">
    <h2 id="builder-modal-title" class="text-xl font-semibold">New Build</h2>
    <div class="flex items-center gap-2">
      <button
        z-button
        type="button"
        [disabled]="!manager.canSave()"
        [attr.aria-label]="'Add build'"
        (click)="manager.saveBuild()"
      >
        <i z-icon zType="plus"></i>
        Add
      </button>
      <button
        z-button
        zType="outline"
        type="button"
        aria-label="Close builder"
        (click)="manager.closeBuilderModal()"
      >
        <i z-icon zType="x"></i>
      </button>
    </div>
  </header>

  <!-- Body -->
  <div class="flex-1 overflow-y-auto p-6">
    <div class="max-w-3xl mx-auto space-y-6">

      <!-- Champion selection -->
      <section aria-label="Champion selection" class="flex flex-col gap-2 space-y-3">
        <h3 class="text-lg font-semibold">Champion</h3>
        <app-champion-search />
        @if (build.selectedChampion()) {
          <app-champion-card />
        }
      </section>

      <!-- Level selector -->
      @if (build.selectedChampion()) {
        <section aria-label="Level selection">
          <app-level-selector />
        </section>
      }

      <!-- Items -->
      @if (build.selectedChampion()) {
        <section aria-label="Items" class="space-y-3">
          <h3 class="text-lg font-semibold">Items</h3>
          <app-item-grid />
        </section>
      }

      <!-- Stats -->
      @if (build.finalStats()) {
        <app-stats-panel />
      }

    </div>
  </div>
</div>
